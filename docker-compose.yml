# ============================================================================
# VYSERA PLATFORM - Docker Compose
# ============================================================================
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d backend      # Start only backend
#   docker-compose up -d frontend     # Start only frontend
# ============================================================================

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vysera-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vysera
      POSTGRES_PASSWORD: vysera_dev_password
      POSTGRES_DB: vysera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vysera"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vysera-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-build
    container_name: vysera-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: "postgresql://vysera:vysera_dev_password@postgres:5432/vysera?schema=public"
      REDIS_URL: "redis://redis:6379"
      CORS_ORIGIN: "http://localhost:3000"
      JWT_SECRET: "dev-jwt-secret-do-not-use-in-production"
      JWT_REFRESH_SECRET: "dev-refresh-secret-do-not-use-in-production"
      ENCRYPTION_KEY: "dev-encryption-key-32chars!!!!!"
      UPLOAD_DIR: "./uploads"
    volumes:
      - upload_data:/app/backend/uploads
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && npx tsx src/server.ts"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-build
    container_name: vysera-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SUPABASE_URL: "https://your-project.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "your-anon-key"
      NEXT_PUBLIC_API_URL: "http://localhost:4000/api"
    command: "npm run dev"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  upload_data:
